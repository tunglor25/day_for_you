<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mở Khóa Tình Yêu</title>
    <link rel="stylesheet" href="css/lock.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="lock-container animate__animated animate__fadeIn">
      <h2 class="lock-title">Chạm để mở khóa</h2>
      <p class="lock-subtitle">Giữ trái tim để đong đầy tình yêu ❤️</p>

      <div class="heart-unlock-wrapper">
        <div class="heart-bg">
          <i class="fa-solid fa-heart"></i>
        </div>
        <div class="heart-fill" id="heartFill">
          <i class="fa-solid fa-heart"></i>
        </div>
        <div class="heart-pulse"></div>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar" id="unlockProgress"></div>
      </div>

      <div class="lock-message" id="lockMessage"></div>
    </div>

    <script src="js/lock.js"></script>
  </body>
</html>
